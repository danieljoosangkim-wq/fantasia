  <script>
    const html = document.documentElement;
    const textNodes = document.querySelectorAll('.t');
    const langToggle = document.getElementById('lang-toggle');
    const navToggle = document.getElementById('nav-toggle');
    const siteNav = document.getElementById('site-nav');
    const navLinks = document.querySelectorAll('#site-nav a');
    const revealItems = document.querySelectorAll('.reveal');
    const yearNode = document.getElementById('year');

    if (yearNode) yearNode.textContent = new Date().getFullYear();

    function applyLanguage(lang) {
      html.setAttribute('data-lang', lang);
      html.setAttribute('lang', lang);
      textNodes.forEach((node) => {
        const value = node.dataset[lang];
        if (value) node.innerHTML = value;
      });
      try { localStorage.setItem('fantasia-final-lang', lang); } catch (e) {}
    }

    let initialLang = 'ko';
    try { initialLang = localStorage.getItem('fantasia-final-lang') || 'ko'; } catch (e) {}
    applyLanguage(initialLang === 'en' ? 'en' : 'ko');

    if (langToggle) {
      langToggle.addEventListener('click', () => {
        const nextLang = html.getAttribute('data-lang') === 'ko' ? 'en' : 'ko';
        applyLanguage(nextLang);
      });
    }

    if (navToggle && siteNav) {
      navToggle.addEventListener('click', () => {
        const isOpen = siteNav.classList.toggle('is-open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
      navLinks.forEach((link) => {
        link.addEventListener('click', () => {
          siteNav.classList.remove('is-open');
          navToggle.setAttribute('aria-expanded', 'false');
        });
      });
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    revealItems.forEach((item) => observer.observe(item));
  </script>
